<!DOCTYPE html>
<html>
<head>
    <title>Donate Food</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h1>Donate Food</h1>

<form method="POST">
    <input type="text" name="food_name" placeholder="Food Name" required><br><br>

    <input type="number" name="quantity" placeholder="Quantity" required><br><br>

    <select name="food_type">
        <option value="Veg">Veg</option>
        <option value="Non-Veg">Non-Veg</option>
    </select><br><br>

    <input type="text" name="location" placeholder="Location" required><br><br>

    <input type="text" name="contact" placeholder="Contact Number" required><br><br>

    <button type="submit">Submit Donation</button>
</form>

</body>
</html>
