<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h1>Register</h1>

<form method="POST">

    <input type="text"
           name="name"
           placeholder="Full Name"
           required>

    <br><br>

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <select name="role">

        <option value="Restaurant">
            Restaurant
        </option>

        <option value="NGO">
            NGO
        </option>

        <option value="Delivery Partner">
            Delivery Partner
        </option>

        <option value="Admin">
            Admin
        </option>

    </select>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<a href="/login">
    Already have an account?
</a>

</body>
</html>
